<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[Hellfire_Archive] Vocabulary Terminal</title>
    <style>
        /* 暗黑破壞神視覺架構 */
        :root { 
            --diablo-red: #660000; 
            --hellfire-gold: #ffaa00; 
            --stone-grey: #2c2c2c;
            --parchment: #d4c4a8;
            --blood-dark: #330000;
            --deep-black: #0d0208;
        }
        
        body { 
            font-family: 'Georgia', serif; 
            background: #1a1a1a; 
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            color: var(--parchment);
            overflow-x: hidden;
        }

        /* 標頭法陣 */
        .header-box {
            width: 100%;
            max-width: 500px;
            background: var(--stone-grey); 
            border: 4px solid var(--diablo-red);
            margin-bottom: 25px; 
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .header-visual {
            position: relative; 
            height: 120px;
            background-color: #0a0a0a;
            background-image: radial-gradient(circle, rgba(139, 0, 0, 0.4) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--diablo-red);
        }

        .seal-rotate {
            position: absolute;
            width: 100px; height: 100px;
            border: 4px double #8B0000;
            border-radius: 50%;
            opacity: 0.5;
            animation: rotate-seal 20s linear infinite;
        }

        .royal-seal-text {
            position: relative; z-index: 5; 
            color: var(--hellfire-gold); 
            font-size: 1.2rem;
            text-shadow: 0 0 10px #ff0000;
            letter-spacing: 4px;
            text-align: center;
        }

        /* 單詞卡容器 */
        .card { 
            background: rgba(30, 30, 30, 0.95); 
            width: 100%; 
            max-width: 500px; 
            min-height: 450px; 
            padding: 40px 25px; 
            border: 2px solid var(--diablo-red);
            border-radius: 2px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        #word { 
            font-size: 3rem; 
            font-weight: bold; 
            color: var(--hellfire-gold); 
            text-shadow: 2px 2px 4px #000, 0 0 20px rgba(255, 170, 0, 0.3);
            margin-bottom: 20px; 
            cursor: pointer; 
        }

        #answer-area { 
            display: none; 
            animation: fade-in 0.4s ease;
        }
        
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #definition { 
            font-size: 1.6rem; 
            color: #fff; 
            border-bottom: 1px solid var(--diablo-red);
            padding-bottom: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            white-space: pre-line;
        }

        .sentence-box { 
            background: var(--blood-dark); 
            padding: 15px; 
            border-left: 4px solid var(--hellfire-gold); 
            margin-bottom: 20px; 
            cursor: pointer; 
            text-align: left;
        }

        #sentence { font-size: 1.1rem; color: var(--parchment); font-style: italic; line-height: 1.5; }

        #mnemonic { 
            font-size: 0.9rem; 
            color: #d4c4a8; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border: 1px dashed var(--diablo-red);
        }

        /* 導航控制 */
        .controls { 
            margin-top: 25px; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            width: 100%; 
            max-width: 500px; 
        }

        button { 
            background: var(--stone-grey); 
            color: var(--parchment);
            border: 1px solid var(--diablo-red); 
            padding: 15px 5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); background: var(--diablo-red); color: white; }
        
        .btn-show { 
            grid-column: span 4; 
            font-size: 1.3rem; 
            background: var(--diablo-red); 
            color: var(--hellfire-gold);
            letter-spacing: 2px;
        }

        .stats { margin-top: 20px; color: var(--diablo-red); letter-spacing: 2px; font-weight: bold; }

        @keyframes rotate-seal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="header-visual">
            <div class="seal-rotate"></div>
            <div class="royal-seal-text">HELLFIRE<br><span style="font-size: 0.7rem; color: #8B0000;">VOCABULARY ARCHIVE</span></div>
        </div>
    </div>

    <div class="card">
        <div id="word" onclick="speak('word')">Loading...</div>
        
        <div id="answer-area">
            <div id="definition" onclick="speak('def')">意義</div>
            <div class="sentence-box" onclick="speak('sentence')">
                <div id="sentence">Loading Sentence...</div>
            </div>
            <div id="mnemonic">Mnemonic Logic...</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-show" onclick="showAnswer()">DECODE (Space)</button>
        <button onclick="handleScore(1)">FAIL</button>
        <button onclick="handleScore(2)">HARD</button>
        <button onclick="handleScore(3)">GOOD</button>
        <button onclick="handleScore(4)">EASY</button>
    </div>

    let currentIndex = 0;

    function updateCard() {
        const data = masterMatrix[currentIndex];
        document.getElementById('word').innerText = data.w;
        document.getElementById('definition').innerText = data.p + '\n' + data.d;
        document.getElementById('sentence').innerText = data.s;
        document.getElementById('mnemonic').innerText = data.m;
        
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('stats').innerText = `SYNC: ${currentIndex + 1}/${masterMatrix.length}`;
        speak('word');
    }

    function showAnswer() {
        document.getElementById('answer-area').style.display = 'block';
        speak('sentence');
    }

    function speak(type) {
        window.speechSynthesis.cancel();
        const data = masterMatrix[currentIndex];
        let text = "";
        let lang = "en-US";
        let rate = 0.8;

        if (type === 'word') {
            text = data.w;
        } else if (type === 'def') {
            text = data.d;
            lang = "zh-TW";
            rate = 1.35;
        } else {
            text = data.s;
            rate = 0.85;
        }

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = lang;
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
    }

    function handleScore(score) {
        currentIndex = (currentIndex + 1) % masterMatrix.length;
        updateCard();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); showAnswer(); }
        if (['1','2','3','4'].includes(e.key)) handleScore(e.key);
    });

    window.onload = updateCard;
</script>
