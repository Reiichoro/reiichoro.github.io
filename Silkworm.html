<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>矩陣微縮版：聯合大作戰 (Silkworm)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0f0;
            font-family: monospace;
        }
        canvas {
            background: linear-gradient(to bottom, #001f3f 0%, #001f3f 70%, #3d9970 70%, #3d9970 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            border: 2px solid #0f0;
        }
        #ui {
            position: absolute;
            top: 20px;
            font-size: 20px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span> | LIVES: <span id="lives">3</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');

        // 遊戲狀態矩陣
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let frameCount = 0;

        // 控制協議
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'Space' && gameOver) resetGame(); // 死亡後重啟
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // 直升機 (Player) 數據實體
        const player = {
            x: 100, y: 150, width: 40, height: 20, speed: 5, color: '#FFDC00',
            cooldown: 0
        };

        // 實體陣列
        let bullets = [];
        let enemies = [];
        let particles = [];

        // 碰撞檢測算法 (AABB)
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // 渲染直升機
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 螺旋槳視覺欺騙
            ctx.fillStyle = '#fff';
            if (frameCount % 4 < 2) {
                ctx.fillRect(player.x - 10, player.y - 5, player.width + 20, 2);
            }
            // 尾翼
            ctx.fillRect(player.x - 10, player.y, 10, 10);
        }

        // 核心邏輯更新
        function update() {
            if (gameOver) return;
            frameCount++;

            // 1. 更新玩家位置
            if (keys.ArrowUp && player.y > 0) player.y -= player.speed;
            if (keys.ArrowDown && player.y < 260) player.y += player.speed; // 限制在天空區域
            if (keys.ArrowLeft && player.x > 0) player.x -= player.speed;
            if (keys.ArrowRight && player.x < canvas.width - player.width) player.x += player.speed;

            // 2. 玩家開火協議
            if (player.cooldown > 0) player.cooldown--;
            if (keys.Space && player.cooldown === 0) {
                bullets.push({ x: player.x + player.width, y: player.y + 8, width: 10, height: 4, speed: 10, color: '#fff' });
                player.cooldown = 15;
            }

            // 3. 更新子彈
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].speed;
                if (bullets[i].x > canvas.width) bullets.splice(i, 1);
            }

            // 4. 生成與更新敵人
            if (Math.random() < 0.02 + (score * 0.0001)) { // 難度遞增
                enemies.push({
                    x: canvas.width, 
                    y: Math.random() * 240 + 10, 
                    width: 30, height: 15, 
                    speed: Math.random() * 3 + 2, 
                    color: '#FF4136'
                });
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].x -= enemies[i].speed;

                // 敵人撞擊玩家
                if (checkCollision(player, enemies[i])) {
                    enemies.splice(i, 1);
                    lives--;
                    createExplosion(player.x, player.y, '#FFDC00');
                    if (lives <= 0) gameOver = true;
                }
                
                // 敵人飛出螢幕
                else if (enemies[i].x < -enemies[i].width) {
                    enemies.splice(i, 1);
                }
            }

            // 5. 碰撞檢測 (子彈打擊敵人)
            for (let i = enemies.length - 1; i >= 0; i--) {
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (enemies[i] && bullets[j] && checkCollision(enemies[i], bullets[j])) {
                        createExplosion(enemies[i].x, enemies[i].y, '#FF4136');
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 100;
                        break;
                    }
                }
            }

            // 更新 UI
            scoreElement.innerText = score;
            livesElement.innerText = lives;
        }

        // 粒子爆炸效果
        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x + 15, y: y + 5,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 20,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 4, 4);
                }
            }
        }

        // 渲染循環
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 背景由 CSS 控制

            if (!gameOver) {
                drawPlayer();
            }

            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
            });

            updateParticles();

            if (gameOver) {
                ctx.fillStyle = '#0f0';
                ctx.font = '40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('SYSTEM FAILURE', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px monospace';
                ctx.fillText('PRESS SPACE TO REBOOT', canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        // 遊戲主循環
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 重啟協議
        function resetGame() {
            score = 0;
            lives = 3;
            enemies = [];
            bullets = [];
            particles = [];
            player.x = 100;
            player.y = 150;
            gameOver = false;
        }

        // 啟動矩陣
        gameLoop();
    </script>
</body>
</html>
